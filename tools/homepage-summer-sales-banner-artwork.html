<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Homepage Summer Sales Banner Artwork</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#fff;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif}
  .artboard{position:relative;width:1916px;height:821px;overflow:hidden;background:linear-gradient(125deg,#fff 0%,#fff 57%,#f5f9f9 100%);color:#092d3f}
  .dotfield{position:absolute;left:24px;top:27px;width:145px;height:54px;opacity:.45;background-image:radial-gradient(#4db9ba 2px,transparent 2px);background-size:15px 15px}
  .corner{position:absolute;left:-74px;bottom:-77px;width:212px;height:154px;border-radius:50%;border:24px solid #e6f3f2}
  .corner::after{content:"";position:absolute;left:90px;top:22px;width:90px;height:46px;background-image:radial-gradient(#6cc6c6 2px,transparent 2px);background-size:14px 14px;opacity:.55}
  .halo{position:absolute;right:286px;top:-255px;width:640px;height:640px;border:1px solid #e8efef;border-radius:50%}
  .scene{position:absolute;left:830px;bottom:0;width:925px;height:655px;overflow:hidden;border-radius:52% 52% 0 0/43% 43% 0 0;background:#dce9e9}
  .scene img{width:100%;height:100%;object-fit:cover;object-position:59% center;filter:saturate(.9) contrast(1.03)}
  .scene::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.22),transparent 25%),linear-gradient(180deg,transparent 62%,rgba(4,62,68,.12))}
  .scene-grid{position:absolute;inset:0;z-index:2;opacity:.78}
  .copy{position:absolute;left:176px;top:143px;width:670px}
  .eyebrow{display:flex;align-items:center;gap:17px;color:#008787;font-size:16px;font-weight:800;letter-spacing:.12em}
  .eyebrow::before{content:"";width:50px;height:4px;background:#008787}
  h1{margin:46px 0 0;font-size:72px;line-height:1.05;letter-spacing:-.045em;font-weight:760;color:#092d3f}
  h1 span{display:block;color:#009796}
  .body{margin-top:34px;width:610px;color:#173d52;font-size:25px;line-height:1.45;letter-spacing:-.012em}
  .cta{margin-top:42px;width:308px;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 28px 0 30px;border-radius:8px;color:#fff;font-size:22px;font-weight:750;box-shadow:0 16px 36px rgba(6,63,69,.16)}
  .cta::after{content:"→";font-size:34px;font-weight:300;line-height:1}
  body.variant-a .cta{background:#fa943e}
  body.variant-b .cta{background:#008787}
  .signals{position:absolute;right:22px;top:148px;width:260px;display:grid;gap:26px}
  .signal{display:grid;grid-template-columns:82px 1fr;align-items:center;gap:18px;color:#123c4d;font-size:14px;font-weight:800;line-height:1.18;letter-spacing:.04em;text-transform:uppercase}
  .signal-icon{width:82px;height:82px;display:grid;place-items:center;border:1px solid #d8e7e8;border-radius:50%;background:rgba(255,255,255,.9);box-shadow:0 7px 16px rgba(13,74,79,.08)}
  .signal svg{width:40px;height:40px;fill:none;stroke:#009796;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .signals::before{content:"";position:absolute;left:40px;top:72px;bottom:72px;border-left:1px dashed #80cece;z-index:-1}
  .signal::after{content:"";position:absolute;left:36px;width:9px;height:9px;border-radius:50%;background:#008787;transform:translateY(44px)}
</style>
</head>
<body>
<main class="artboard" aria-label="2026 Summer Sales homepage banner">
  <div class="dotfield"></div><div class="corner"></div><div class="halo"></div>
  <section class="copy">
    <div class="eyebrow">2026 SUMMER SALES</div>
    <h1>Upgrade your<br>industrial network <span>this summer.</span></h1>
    <p class="body">Explore selected Moxa industrial networking solutions and get expert guidance for your next deployment.</p>
    <div class="cta" id="ctaLabel">Inquire Now</div>
  </section>
  <section class="scene" aria-hidden="true">
    <img src="../img/scenario-energy.jpg" alt="">
    <svg class="scene-grid" viewBox="0 0 925 655" preserveAspectRatio="none">
      <g fill="none" stroke="#31c9c5" stroke-width="2">
        <path d="M48 520 C220 438 335 556 510 461 S760 378 890 420"/>
        <path d="M122 594 C286 507 391 606 570 525 S760 482 910 518" opacity=".7"/>
      </g>
      <g fill="#fff" stroke="#36c8c4" stroke-width="3">
        <circle cx="180" cy="490" r="7"/><circle cx="370" cy="511" r="7"/><circle cx="550" cy="442" r="7"/><circle cx="742" cy="399" r="7"/><circle cx="835" cy="417" r="7"/>
      </g>
    </svg>
  </section>
  <aside class="signals" aria-hidden="true">
    <div class="signal"><span class="signal-icon"><svg viewBox="0 0 48 48"><path d="M25 3 12 26h11l-2 19 15-26H25z"/></svg></span><span>Reliable<br>power</span></div>
    <div class="signal"><span class="signal-icon"><svg viewBox="0 0 48 48"><path d="M24 6a16 16 0 1 0 16 16"/><path d="M24 14v10l7 4"/><path d="m35 7 5 1-1 5"/></svg></span><span>High<br>availability</span></div>
    <div class="signal"><span class="signal-icon"><svg viewBox="0 0 48 48"><rect x="8" y="9" width="32" height="30" rx="3"/><path d="M15 18h18M15 25h18M15 32h11"/></svg></span><span>Scalable<br>deployment</span></div>
    <div class="signal"><span class="signal-icon"><svg viewBox="0 0 48 48"><path d="M10 27v-5a14 14 0 0 1 28 0v5"/><path d="M10 26h7v12h-7zM31 26h7v12h-7zM31 40c-2 3-5 4-9 4"/></svg></span><span>Expert<br>guidance</span></div>
  </aside>
</main>
<script>
  const variant = new URLSearchParams(location.search).get('variant') === 'B' ? 'B' : 'A';
  document.body.className = `variant-${variant.toLowerCase()}`;
  document.getElementById('ctaLabel').textContent = variant === 'B' ? 'Contact an Expert' : 'Inquire Now';
</script>
</body>
</html>
